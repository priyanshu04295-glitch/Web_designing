<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border:2px solid black;
            padding:34px;
            box-shadow: 10px 15px 5px maroon;
        }
        .text-element{
            text-shadow: 10px 5px 3px red;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>
    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Expedita illo enim, at odio commodi nam tempore qui adipisci debitis hic repellat accusantium inventore pariatur est.
    </p>
</body>
</html>
